# ============================================================================
# VibeCode OS — Kitty Configuration
# ============================================================================

# === Font ===
font_family      JetBrains Mono
bold_font          auto
italic_font        auto
bold_italic_font   auto
font_size          13.0

# === Colors (VibeCode palette) ===
# Background: #0B1020
# Primary: #4CC9F0 (neon blue)
# Accent: #7209B7 (purple)
# Success: #2EC4B6 (mint)
# Warning: #FFE066 (yellow)

foreground     #e0e0e0
background     #0B1020

# Normal colors
color0  #1B2340  # Bright black (UI elements)
color1  #ff6b6b  # Red (errors)
color2  #2EC4B6  # Green (success)
color3  #FFE066  # Yellow (warnings)
color4  #4CC9F0  # Blue (primary)
color5  #7209B7  # Magenta (accent)
color6  #2EC4B6  # Cyan (success)
color7  #e0e0e0  # White (text)

# Bright colors
color8   #4a5568
color9   #ff8787
color10  #3dd9c9
color11  #fff099
color12  #6dd5fa
color13  #8b5cf6
color14  #3dd9c9
color15  #ffffff

# === Window ===
remember_window_size  no
initial_window_width   90
initial_window_height  30
window_padding_width   10
window_padding_height  10

# === Tab bar ===
tab_bar_edge                 bottom
tab_bar_margin_width         0
tab_bar_margin_height        0
tab_bar_style                powerline
tab_bar_min_tabs             2
tab_switch_strategy          previous
tab_bar_powerline_glyph_style 1

active_tab_foreground   #0B1020
active_tab_background   #4CC9F0
active_tab_font_style   bold
inactive_tab_foreground #8892b0
inactive_tab_background #1B2340
inactive_tab_font_style normal

# === Cursor ===
cursor              #4CC9F0
cursor_text_color   #0B1020
cursor_shape        beam
cursor_beam_thickness 2

# === Selection ===
selection_foreground  #0B1020
selection_background  #4CC9F0

# === Scrollback ===
scrollback_lines       10000
scrollback_pager_history_size 100

# === Mouse ===
hide_mouse_when_typing  yes

# === Shell ===
# shell zsh  # Use system default

# === Key mappings ===
# Map Ctrl+Shift+V to paste (like VS Code)
map ctrl+shift+v paste_from_clipboard

# Map Ctrl+Shift+C to copy (like VS Code)
map ctrl+shift+c copy_to_clipboard

# Map Ctrl+Shift+T to new tab
map ctrl+shift+t new_tab

# Map Ctrl+Shift+W to close window
map ctrl+shift+w close_window

# Map Ctrl+Tab to next_tab
map ctrl+tab next_tab

# Map Ctrl+Shift+Tab to previous_tab
map ctrl+shift+tab previous_tab

# Map Ctrl+Plus to increase_font_size
map ctrl+equal change_font_size all +2.0

# Map Ctrl+Minus to decrease_font_size
map ctrl+minus change_font_size all -2.0

# === Misc ===
enable_audio_bell no
visual_bell_duration 0.1
confirm_os_window_close 0
allow_remote_control no
listen_on none
