# ============================================================================
# VibeCode OS — Hyprland Configuration
# ============================================================================
# Конфигурация Hyprland для вайбкодинга
# Цвета, анимации, биндинги — всё для продуктивной работы
# ============================================================================

# === MONITORS ===
monitor=,preferred,auto,auto

# === GENERAL ===
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle
    resize_on_border = true
}

# === COLORS (VibeCode palette) ===
# Background: #0B1020 (dark blue-black)
# Primary: #4CC9F0 (neon blue)
# Accent: #7209B7 (purple)
# Success: #2EC4B6 (mint)

col.active_border = rgba(4CC9F0ff) rgba(7209B7ff) 45deg
col.inactive_border = rgba(1B2340ff)
col.nogroup_border = rgba(FFE066ff)

# === ANIMATIONS ===
animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInCubic, 0.55, 0.055, 0.675, 0.19
    bezier = smooth, 0.25, 0.1, 0.25, 1.0

    animation = windows, 1, 5, easeOutQuint
    animation = windowsIn, 1, 5, easeOutQuint, popin 80%
    animation = windowsOut, 1, 4, easeInCubic
    animation = fading, 1, 3, smooth
    animation = fade, 1, 3, smooth
    animation = layers, 1, 4, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint
    animation = layersOut, 1, 3, easeInCubic
    animation = workspaces, 1, 4, easeOutQuint
    animation = border, 1, 3, smooth
    animation = special, 1, 4, easeOutQuint
}

# === INPUT ===
input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle
    kb_variant =
    kb_model =
    kb_rules =

    follow_mouse = 1
    mouse_refocus = true

    sensitivity = 0
    accel_profile = adaptive

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
        clickfinger_behavior = true
    }
}

# === DWINDLE ===
dwindle {
    pseudotile = true
    preserve_split = true
    smart_resizing = true
    smart_splitting = true
    no_gaps_when_only = false
    force_split = 0
    special_scale_factor = 0.8
    split_width_multiplier = 1.0
    use_active_for_splits = true
    default_split_ratio = 1.0
}

# === MISC ===
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    always_follow_on_dnd = true
    layers_hog_keyboard_focus = true
    animate_manual_resizing = true
    animate_mouse_windowdragging = true
    enable_swallow = false
    focus_on_activate = true
    new_window_takes_over_fullscreen = 0
}

# === EXEC-ONCE (автозапуск) ===
exec-once = waybar
exec-once = dunst
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = nm-applet &
exec-once = blueman-applet &

# === KEYBINDINGS ===

# Terminal
bind = SUPER, Return, exec, kitty

# File manager
bind = SUPER, E, exec, thunar

# Application launcher
bind = SUPER, Space, exec, wofi --show drun

# Screenshot
bind = SUPER, P, exec, vibe-screenshot

# Close window
bind = SUPER, Q, killactive,

# Toggle fullscreen
bind = SUPER, F, fullscreen, 0

# Toggle fake fullscreen (no gaps)
bind = SUPER SHIFT, F, fullscreen, 1

# Toggle floating
bind = SUPER, G, togglefloating,

# Move focus
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Switch workspaces (1-9)
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = SUPER, S, togglespecialworkspace,

# Scroll through workspaces
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Resize windows (arrow keys)
bind = SUPER CTRL, left, resizeactive, -50 0
bind = SUPER CTRL, right, resizeactive, 50 0
bind = SUPER CTRL, up, resizeactive, 0 -50
bind = SUPER CTRL, down, resizeactive, 0 50

# Volume control
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t

# Brightness control
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Media controls
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Lock screen
bind = SUPER, Escape, exec, swaylock

# Power menu
bind = SUPER SHIFT, Q, exec, wlogout

# === WINDOWRULES ===
windowrule = float, ^(wofi)$
windowrule = float, ^(wofi --show)$
windowrule = float, ^(pavucontrol)$
windowrule = float, ^(blueman-manager)$
windowrule = float, ^(nm-connection-editor)$
windowrule = float, ^(org.gnome.Calculator)$

# Center floating windows
windowrule = center, ^(wofi)$

# Fix for some X11 apps
windowrule = xwayland, ^(steam)$
windowrule = xwayland, ^(discord)$

# === WINDOWRULESV2 ===
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$

# === AUTOSAVE ===
# Hyprland automatically saves and restores workspace state
# No need for manual configuration
