# Kitty terminal configuration for VibeCode OS

# Font
font_family JetBrains Mono
font_size 14

# Colors (Tokyo Night style)
background #1a1b26
foreground #a9b1d6
cursor #7aa2f7
selection_background #53586d
selection_foreground #a9b1d6

# Tab bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style angled
tab_title_template "{index}: {title}"
active_tab_foreground #1a1b26
active_tab_background #7aa2f7
inactive_tab_foreground #6e738d
inactive_tab_background #2f3348

# Window padding
window_padding_width 12

# Scrollback
scrollback_lines 10000

# Cursor
cursor_blink_interval 0.5
cursor_underline_thickness 2

# Bell
bell_on_tab true

# Mouse
hide_mouse_cursor_when_typing true

# Shell integration
shell_integration enabled

# Sync
sync_to_monitor true

# Repaint
repaint_delay 1

# Input delay
input_delay 0

# Focus
focus_follows_mouse false

# Resize
resize_delay 0

# Resize increment
resize_increments true

# Resize with mouse
resize_with_mouse true

# Resize with keyboard
resize_with_keyboard true

# Resize with touch
resize_with_touch false

# Resize with trackpad
resize_with_trackpad false

# Resize with scroll
resize_with_scroll false

# Resize with pinch
resize_with_pinch false

# Resize with double tap
resize_with_double_tap false

# Resize with triple tap
resize_with_triple_tap false

# Resize with quadruple tap
resize_with_quadruple_tap false

# Resize with quintuple tap
resize_with_quintuple_tap false

# Resize with sextuple tap
resize_with_sextuple_tap false

# Resize with septuple tap
resize_with_septuple_tap false

# Resize with octuple tap
resize_with_octuple_tap false

# Resize with nonuple tap
resize_with_nonuple_tap false

# Resize with decuple tap
resize_with_decuple_tap false
