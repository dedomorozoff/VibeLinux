# VibeCode OS - Starship Prompt Configuration

format = """
[в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ>](bold green)
[в”Ӯ](bold green)$directory$rust$python$node$golang$git_branch$git_status
[в””в”Җ>](bold green) $character"""

# Character
[character]
success_symbol = "[вһң](bold green)"
error_symbol = "[вң—](bold red)"
vimcmd_symbol = "[вқ®](bold green)"

# Directory
[directory]
truncation_length = 3
truncate_to_repo = true
format = "[$read_only]($read_only_color )[$cropped_repo_root](bold blue)[$inner](default)"
read_only = "рҹ”’"
read_only_color = "red"

# Git
[git_branch]
symbol = " "
format = "on [$symbol$branch]($style) "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold yellow"
conflicted = "вҡ”пёҸ "
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
untracked = "?${count}"
stashed = "рҹ“Ұ"
modified = "!${count}"
staged = '+${count}'
renamed = "В»${count}"
deleted = "вңҳ${count}"

# Rust
[rust]
symbol = " "
format = "via [$symbol($version )](bold red)"
version_format = "v${raw}"

# Python
[python]
symbol = " "
format = "via [${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )](bold yellow)"
pyenv_version_name = false
pyenv_prefix = "pyenv "

# Node
[nodejs]
symbol = " "
format = "via [$symbol($version )](bold green)"

# Golang
[golang]
symbol = " "
format = "via [$symbol($version )](bold cyan)"

# Docker
[docker_context]
symbol = " "
format = "via [$symbol$context](bold blue)"

# Kubernetes
[kubernetes]
symbol = "вҳё "
format = 'on [$symbol$context( \($namespace\) )](bold blue)'
disabled = false

# Time
[time]
disabled = true
format = "[@$time]($style) "

# Shell
[shell]
bash_indicator = ""
fish_indicator = ""
zsh_indicator = ""
ion_indicator = ""
powershell_indicator = ""
python_indicator = ""
julia_indicator = ""
ruby_indicator = ""
aws_indicator = ""
conda_indicator = ""
dart_indicator = ""
dotnet_indicator = ""
elixir_indicator ""
elm_indicator = ""
erlang_indicator = ""
go_indicator = ""
helm_indicator = ""
java_indicator = ""
julia_indicator = ""
kotlin_indicator = ""
lua_indicator = ""
nim_indicator = ""
nodejs_indicator = ""
ocaml_indicator = ""
perl_indicator = ""
php_indicator = ""
purescript_indicator = ""
rust_indicator = ""
scala_indicator = ""
swift_indicator = ""
terraform_indicator = ""
terraform_workspace = "рҹҸў "
vagrant_indicator = ""
vcsh_indicator = ""

# Newline
[line_break]
disabled = false

# Package
[package]
symbol = "рҹ“Ұ "
format = "is [$symbol$version](bold green) "
