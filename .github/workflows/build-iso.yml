name: Build VibeCode OS ISO (draft)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "scripts/**"
      - ".github/workflows/build-iso.yml"

jobs:
  build-iso:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up build dependencies (draft)
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap squashfs-tools xorriso grub-pc-bin grub-efi-amd64-bin mtools

      - name: Make build script executable
        run: |
          chmod +x scripts/build/build-iso.sh

      - name: Build ISO (draft dry-run)
        env:
          BUILD_MODE: dry-run
        run: |
          ./scripts/build/build-iso.sh

      - name: Basic script syntax check
        run: |
          bash -n scripts/base/base-packages.sh
          bash -n scripts/base/cleanup.sh
          bash -n scripts/desktop/install-mate.sh
          bash -n scripts/drivers/install-nvidia.sh
          bash -n scripts/build/build-iso.sh

      - name: Optional shellcheck (if available)
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck scripts/base/base-packages.sh
            shellcheck scripts/base/cleanup.sh
            shellcheck scripts/desktop/install-mate.sh
            shellcheck scripts/drivers/install-nvidia.sh
            shellcheck scripts/build/build-iso.sh
          else
            echo "shellcheck not installed, skipping static analysis."
          fi


