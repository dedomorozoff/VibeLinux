name: Build VibeCode OS ISO

# ⚠️ AUTOMATIC BUILDS DISABLED TO SAVE GITHUB STORAGE SPACE
# Manual builds only- use "Run workflow" button when needed
# Storage used by artifacts counts against GitHub plan limits

on:
  workflow_dispatch:
  inputs:
    build_mode:
        description: 'Build mode (dry-run|full)'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - full
  # push:  # DISABLED - automatic builds consume too much storage
  #  branches:
  #     - main
  #     - master
  #   paths:
  #     - "scripts/**"
  #     - "branding/**"
  #     - ".github/workflows/build-iso.yml"
  # pull_request:  # DISABLED - automatic builds consume too much storage
  #  branches:
  #     - main
  #     - master

jobs:
  # Быстрая проверка синтаксиса
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Check script syntax
        run: |
          bash -n scripts/build-iso.sh
          bash -n scripts/base/*.sh
          bash -n scripts/desktop/*.sh
          bash -n scripts/drivers/*.sh

      - name: Run shellcheck
        run: |
          shellcheck scripts/build-iso.sh || true
          shellcheck scripts/base/*.sh || true
          shellcheck scripts/desktop/*.sh || true
          shellcheck scripts/drivers/*.sh || true

  # Dry-run проверка
  dry-run:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools

      - name: Run dry-run check
        env:
          BUILD_MODE: dry-run
        run: |
          chmod +x scripts/build-iso.sh
          ./scripts/build-iso.sh

  # Полная сборка ISO
  build-iso:
   runs-on: ubuntu-latest
   needs: dry-run
   if: github.event_name == 'workflow_dispatch'
    
   steps:
      - name: ⚠️ STORAGE WARNING
       run: |
         echo "⚠️  This build will consume GitHub Actions storage space"
         echo "📦 Artifact files are stored for 30 days (retention-days)"
         echo "💾 Total storage affects your GitHub plan limits"
         echo ""
         echo "Build mode: ${{ github.event.inputs.build_mode || 'dry-run' }}"
      
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            genisoimage

      - name: Build ISO
      env:
          BUILD_MODE: ${{ github.event.inputs.build_mode || 'dry-run' }}
     run: |
       chmod +x scripts/build-iso.sh
       sudo BUILD_MODE=${{ github.event.inputs.build_mode || 'dry-run' }} ./scripts/build-iso.sh

      - name: Check ISO file
        run: |
          ls -lh build/VibeCodeOS-alpha.iso
          file build/VibeCodeOS-alpha.iso

      - name: Generate checksums
        run: |
          sudo chown -R $USER:$USER build/
          cd build
          sha256sum VibeCodeOS-alpha.iso > VibeCodeOS-alpha.iso.sha256
          md5sum VibeCodeOS-alpha.iso > VibeCodeOS-alpha.iso.md5
          echo "SHA256:"
          cat VibeCodeOS-alpha.iso.sha256
          echo "MD5:"
          cat VibeCodeOS-alpha.iso.md5

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeCodeOS-alpha-iso
          path: |
            build/VibeCodeOS-alpha.iso
            build/VibeCodeOS-alpha.iso.sha256
            build/VibeCodeOS-alpha.iso.md5
          retention-days: 30

      - name: Create build info
        run: |
          cat > build/build-info.txt << EOF
          Build Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Git Commit: ${{ github.sha }}
          Git Branch: ${{ github.ref_name }}
          Workflow Run: ${{ github.run_number }}
          EOF
          cat build/build-info.txt

      - name: Upload build info
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: build/build-info.txt
          retention-days: 30


